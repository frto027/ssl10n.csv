name:  Sync mods

on:
  workflow_dispatch:
  workflow_call:

jobs:
  upload-crowdin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Synchronize Mods
        run: npm install && npm run mod_sync
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
