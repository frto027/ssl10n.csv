name:  Sync mods

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */1 * *'

jobs:
 do-mod-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          
      - name: npm install
        run: npm install
        
      - name: npm run mod_sync
        id: sync
        run: npm run mod_sync

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          title: "[bot] Synchronize Mod Strings $${{steps.sync.outputs.mods}}"
          body: Automated mod sync with 'npm run mod_sync'
          branch: auto_mod_sync
