name:  Sync mods

on:
  workflow_dispatch:
  workflow_call:

jobs:
 do-mod-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Synchronize Mods
        run: npm install && npm run mod_sync
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          title: "[bot] Synchronize Mod Strings"
          body: Automated mod sync with 'npm run mod_sync'
          branch: auto_mod_sync