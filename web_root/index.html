<html>
<head>
<body>
    <script src="https://code.jquery.com/jquery-4.0.0.slim.min.js"
        integrity="sha256-8DGpv13HIm+5iDNWw1XqxgFB4mj+yOKFNb+tHBZOowc=" crossorigin="anonymous"></script>
    <script src="jszip.min.js"></script>
    <script>
        load();
        async function load() {
            let json = (await (await fetch("./manifest.json")).json())["mods"]

            let elem_infos = $("#mod-infos")
            for (let modId in json) {
                info = json[modId]

                elem_infos.append($("<h4></h4>").text(modId))
                for (let data of info.datas) {
                    elem_infos.append(
                        $("<table></table>")
                            .attr({
                                border: "1px solid black"
                            })
                            .append($("<tr></tr>")
                                .append($("<td></td>").text("version"))
                                .append($("<td></td>").text(data.version))
                            )
                            .append($("<tr></tr>")
                                .append($("<td></td>").text("csv_url"))
                                .append($("<td></td>").text(data.csv_url))
                            )
                            .append($("<tr></tr>")
                                .append($("<td></td>").text("md5"))
                                .append($("<td></td>").text(data.md5))
                            )
                            .append($("<tr></tr>")
                                .append($("<td></td>").text("csv_name"))
                                .append($("<td></td>").text(data.csv_name))
                            )
                            .append($("<tr></tr>")
                                .append($("<td></td>").text("operate"))
                                .append($("<td></td>")
                                    .append($("<a>download csv</a>").attr("href", data.csv_url).attr("target", "_blank"))
                                    .append("&nbsp;&nbsp;&nbsp;")
                                    //.append($("<button>download offline qmod file</button>").on("click", () => download_offline_qmod(modId, info, data)))
                                )
                            )
                    )
                }

            }
        }

        function download_offline_qmod(modId, info, versionData) {
            console.log("download offline qmod", modId, info, versionData)

            fetch(versionData.csv_url).then(v=>{
                v.bytes().then(bytes=>{
                    mod_json = {
                        "$schema": "https://raw.githubusercontent.com/Lauriethefish/QuestPatcher.QMod/refs/heads/main/QuestPatcher.QMod/Resources/qmod.schema.json",
                        "name": `LoqolizerResPack-${versionData.csv_name}(${versionData.md5})`,
                        "id": `LoqolizerResPack-${modId}`,
                        "author": "AutoGenerated",
                        "version": `0.0.1-${versionData.md5}`,
                        "packageId": "com.beatgames.beatsaber",
                        "description": `Loqolizer resource pack for mod ${modId}(${versionData.version}).`,
                        "fileCopies": [
                            {
                                "name": "resource.csv",
                                "destination": "/sdcard/ModData/com.beatgames.beatsaber/Mods/Loqolizer/csv/SSL10nGenerated/" + versionData.md5 + "." + versionData.csv_name
                            }
                        ],
                        "dependencies":[
                            {
                                "version": ">=0.0.1",
                                "id":"Loqolizer",
                                "required": true
                            }
                        ]
                    }

                    let zip = new JSZip();
                    zip.file("mod.json", JSON.stringify(mod_json))
                    zip.file("resource.csv", bytes)
                    zip.generateAsync({type:"blob"})
                        .then(function (blob) {
                            const objectURL = URL.createObjectURL(blob);

                            const link = document.createElement( 'a' );
                            link.style.display = 'none';
                            document.body.appendChild( link );
                            link.href = objectURL;
                            link.href = URL.createObjectURL( blob );
                            link.download = `LoqolizerResPack-${modId}-${versionData.md5}.qmod`;
                            link.click();

                        });
                })
            })
        }
    </script>

    <h3>SSL10n.csv</h3>

    <p>
        This is a beatsaber quest localization repo for mod localization work. <br/> The contents is synchronized from <a href="https://crowdin.com/project/beatsaber-sslocalization">crowdin</a> everyday.<br/>
        Join the translate at crowdin!
    </p>

</body>
</head>
